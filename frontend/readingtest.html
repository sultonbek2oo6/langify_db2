<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reading Test</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .passage {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      height: 90vh;
      overflow-y: auto;
    }

    .questions {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      height: 90vh;
      overflow-y: auto;
    }

    .question {
      margin-bottom: 15px;
    }

    button {
      padding: 10px 15px;
      background: blue;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="passage" id="passage"></div>

  <div class="questions">
    <form id="readingForm">
      <div id="questionsContainer"></div>
      <button type="submit">Submit</button>
    </form>
    <div id="result"></div>
  </div>
</div>

<script src="readingtest.js"></script>
</body>
</html>
