<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Listening Test</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .player-box {
      background: #2f4a63;
      padding: 20px;
      border-radius: 12px;
      color: white;
      margin-bottom: 20px;
      text-align: center;
    }

    .questions-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    .question {
      margin-bottom: 20px;
    }

    .question-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 20px;
    }

    .question-nav button {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    .question-nav button.active {
      background: blueviolet;
      color: white;
    }

    input[type="text"] {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .submit-btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: blueviolet;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="timer-box" style="text-align: center; font-size: 24px; font-weight: bold; padding: 15px; background: #fff; border-radius: 12px; margin-bottom: 20px; color: #2f4a63; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
   🕒 Vaqt: <span id="time-display">20:00</span>
  </div>
  <!-- AUDIO -->
  <div class="player-box">
    <h2>🎧 Audio Player</h2>
    <audio id="audioPlayer" controls style="width:100%"></audio>
    <p>Playing: Part 1</p>
  </div>

  <!-- QUESTIONS -->
  <div class="questions-box">
    <form id="testForm">
      <div id="questionsContainer"></div>

      <div class="footer-nav" style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
        <button type="button" onclick="goToDashboard()" style="padding: 12px 20px; background: #6c757d; color: white; border: none; border-radius: 10px; cursor: pointer;">
          Dashboardga qaytish
        </button>

        <div>
         <button type="submit" id="submitBtn" class="submit-btn" style="margin-top: 0;">Submit</button>
          <button type="button" onclick="nextTest()" style="margin-left: 10px; padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
           Keyingi test
          </button>
        </div>
      </div>
      
    </form>

    <div id="result"></div>

    <!-- NAV -->
    <div id="questionNav" class="question-nav"></div>
  </div>

  <script src="js/listeningtest.js"></script>
</body>
</html>
